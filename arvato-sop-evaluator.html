// Minimal ZIP parser using browser DecompressionStream
async function parseZip(arrayBuffer) {
  const view = new DataView(arrayBuffer);
  const entries = [];
  let offset = 0;
  const maxOffset = arrayBuffer.byteLength - 4;
  while (offset < maxOffset) {
    const sig = view.getUint32(offset, true);
    if (sig !== 0x04034b50) break;
    const compression = view.getUint16(offset + 8, true);
    const compSize = view.getUint32(offset + 18, true);
    const uncompSize = view.getUint32(offset + 22, true);
    const nameLen = view.getUint16(offset + 26, true);
    const extraLen = view.getUint16(offset + 28, true);
    const name = new TextDecoder().decode(new Uint8Array(arrayBuffer, offset + 30, nameLen));
    const dataStart = offset + 30 + nameLen + extraLen;
    const raw = new Uint8Array(arrayBuffer, dataStart, compSize);
    let data = raw;
    if (compression === 8 && compSize > 0) {
      try {
        const ds = new DecompressionStream("deflate-raw");
        const w = ds.writable.getWriter();
        w.write(raw); w.close();
        const r = ds.readable.getReader();
        const chunks = [];
        while (true) { const { done, value } = await r.read(); if (done) break; chunks.push(value); }
        const total = chunks.reduce((s, c) => s + c.length, 0);
        data = new Uint8Array(total);
        let p = 0; for (const c of chunks) { data.set(c, p); p += c.length; }
      } catch { data = raw; }
    }
    entries.push({ name, data });
    offset = dataStart + compSize;
  }
  return entries;
}

function extractTextFromXml(xml) {
  const texts = [];
  const regex = /<a:t[^>]*>([\s\S]*?)<\/a:t>/g;
  let m;
  while ((m = regex.exec(xml)) !== null) texts.push(m[1]);
  return texts.join(" ").replace(/&amp;/g, "&").replace(/&lt;/g, "<").replace(/&gt;/g, ">").replace(/&quot;/g, '"').replace(/&#39;/g, "'").trim();
}

// Parse PPTX
async function parsePptx(arrayBuffer) {
  const entries = await parseZip(arrayBuffer);
  const slides = [];
  const slideEntries = entries
    .filter(e => /^ppt\/slides\/slide\d+\.xml$/i.test(e.name))
    .sort((a, b) => {
      const na = parseInt(a.name.match(/\d+/)?.[0] || "0");
      const nb = parseInt(b.name.match(/\d+/)?.[0] || "0");
      return na - nb;
    });
  for (const entry of slideEntries) {
    const xml = new TextDecoder().decode(entry.data);
    const text = extractTextFromXml(xml);
    const num = entry.name.match(/\d+/)?.[0] || "?";
    if (text.trim()) slides.push({ heading: `Slayt ${num}`, content: text });
  }
  return slides;
}

// Parse DOCX using mammoth
async function parseDocx(arrayBuffer) {
  const result = await mammoth.convertToHtml({ arrayBuffer });
  const html = result.value;
  const parser = new DOMParser();
  const doc = parser.parseFromString(html, "text/html");
  const sections = [];
  let currentHeading = "Genel";
  let currentHeadingPath = ["Genel"];
  let currentParagraphs = [];

  const flush = () => {
    if (currentParagraphs.length > 0) {
      sections.push({
        heading: currentHeading,
        headingPath: [...currentHeadingPath],
        content: currentParagraphs.join("\n"),
      });
      currentParagraphs = [];
    }
  };

  const els = doc.body.children;
  for (let i = 0; i < els.length; i++) {
    const el = els[i];
    const tag = el.tagName.toLowerCase();
    if (/^h[1-6]$/.test(tag)) {
      flush();
      const level = parseInt(tag[1]);
      currentHeading = el.textContent.trim();
      if (level === 1) currentHeadingPath = [currentHeading];
      else if (level === 2) currentHeadingPath = [currentHeadingPath[0] || "Genel", currentHeading];
      else currentHeadingPath = [...currentHeadingPath.slice(0, level - 1), currentHeading];
    } else {
      const text = el.textContent.trim();
      if (text) currentParagraphs.push(text);
    }
  }
  flush();

  if (sections.length === 0 && html) {
    const allText = doc.body.textContent.trim();
    if (allText) sections.push({ heading: "Genel", headingPath: ["Genel"], content: allText });
  }
  return sections;
}

// Parse XLSX
function parseXlsx(arrayBuffer) {
  try {
    const XLSX = window.XLSX;
    if (!XLSX) return [];
    const wb = XLSX.read(arrayBuffer, { type: "array" });
    const sections = [];
    for (const sheetName of wb.SheetNames) {
      const ws = wb.Sheets[sheetName];
      const data = XLSX.utils.sheet_to_json(ws, { header: 1, defval: "" });
      if (!data || data.length === 0) continue;
      const headers = data[0]?.map(String) || [];
      const rows = data.slice(1);
      let content = "";
      if (headers.length) content += "Başlıklar: " + headers.join(" | ") + "\n";
      for (let r = 0; r < rows.length; r++) {
        const row = rows[r];
        if (!row || row.every(c => c === "" || c == null)) continue;
        const rowText = row.map((cell, ci) => {
          const h = headers[ci] || `Sütun${ci + 1}`;
          return `${h}: ${cell}`;
        }).join(" | ");
        content += `Satır ${r + 2}: ${rowText}\n`;
      }
      if (content.trim()) {
        sections.push({ heading: `Sayfa: ${sheetName}`, headingPath: [sheetName], content: content.trim() });
      }
    }
    return sections;
  } catch (e) {
    console.error("XLSX parse error:", e);
    return [];
  }
}

// Fuzzy search
function normalize(str) {
  return str.toLowerCase()
    .replace(/ı/g, "i").replace(/İ/g, "i")
    .replace(/ğ/g, "g").replace(/Ğ/g, "g")
    .replace(/ü/g, "u").replace(/Ü/g, "u")
    .replace(/ş/g, "s").replace(/Ş/g, "s")
    .replace(/ö/g, "o").replace(/Ö/g, "o")
    .replace(/ç/g, "c").replace(/Ç/g, "c")
    .replace(/[^a-z0-9\s]/g, " ")
    .replace(/\s+/g, " ").trim();
}

function levenshtein(a, b) {
  const m = a.length, n = b.length;
  if (m === 0) return n;
  if (n === 0) return m;
  const dp = Array.from({ length: m + 1 }, () => Array(n + 1).fill(0));
  for (let i = 0; i <= m; i++) dp[i][0] = i;
  for (let j = 0; j <= n; j++) dp[0][j] = j;
  for (let i = 1; i <= m; i++)
    for (let j = 1; j <= n; j++)
      dp[i][j] = Math.min(dp[i-1][j]+1, dp[i][j-1]+1, dp[i-1][j-1]+(a[i-1]===b[j-1]?0:1));
  return dp[m][n];
}

function wordSimilarity(a, b) {
  const maxLen = Math.max(a.length, b.length);
  if (maxLen === 0) return 1;
  return 1 - levenshtein(a, b) / maxLen;
}

// Terms that need word-START boundary matching (allows Turkish suffixes like "depoda" but not "xyzdepo")
const BOUNDARY_TERMS = new Set([
  "po", "ft", "qc", "asn", "sku", "sla", "kpi", "mks",
  "fifo", "fefo", "lifo", "skt", "cmr",

]);

function isSignificant(w) {
  if (STOPWORDS.has(w)) return false;
  if (w.length >= 3) return true;
  return BOUNDARY_TERMS.has(w);
}

// Check if a word exists in text — word-start boundary for domain terms
// "depo" matches "depoda" (suffix) but NOT "...xyzdepo..." (inside word)
// "po" matches " po " or " po'ları" but NOT "depo" or "poşet"
function wordExistsIn(word, normalizedText) {
  if (BOUNDARY_TERMS.has(word)) {
    // Must have non-alphanumeric (or start) BEFORE the word
    // Short terms (<=3 chars) also need non-alphanumeric AFTER (full word boundary)
    if (word.length <= 3) {
      const regex = new RegExp(`(^|[^a-z0-9])${word}([^a-z0-9]|$)`);
      return regex.test(normalizedText);
    } else {
      // Longer terms: only check START boundary (allow Turkish suffixes after)
      const regex = new RegExp(`(^|[^a-z0-9])${word}`);
      return regex.test(normalizedText);
    }
  }
  return normalizedText.includes(word);
}

// Build normalized domain term list with match strategy
const DOMAIN_TERMS = DOMAIN_TERMS_RAW.map(raw => {
  const norm = normalize(raw);
  const isShort = norm.length <= 4 && !norm.includes(" ");
  return { original: raw, normalized: norm, wholeWord: isShort };
});
// Sort: longest first for greedy phrase matching
DOMAIN_TERMS.sort((a, b) => b.normalized.length - a.normalized.length);

// Check if a term exists in text (whole-word aware)
function termExistsIn(term, normalizedText) {
  if (term.wholeWord || BOUNDARY_TERMS.has(term.normalized)) {
    if (term.normalized.length <= 3) {
      // Full word boundary for very short terms
      const regex = new RegExp(`(^|[^a-z0-9])${term.normalized}([^a-z0-9]|$)`);
      return regex.test(normalizedText);
    } else {
      // Word-start boundary (allows Turkish suffixes: muhur→muhurlu OK)
      const regex = new RegExp(`(^|[^a-z0-9])${term.normalized}`);
      return regex.test(normalizedText);
    }
  } else {
    return normalizedText.includes(term.normalized);
  }
}

// Extract domain terms found in a query
function extractQueryDomainTerms(queryText, extraTerms, excludedSet) {
  const norm = normalize(queryText);
  const found = [];
  let remaining = norm;

  // Combine static + discovered terms, sorted longest first
  let allTerms = DOMAIN_TERMS;
  if (extraTerms && extraTerms.length > 0) {
    const extras = extraTerms.map(t => ({
      original: t.original,
      normalized: t.normalized,
      wholeWord: t.normalized.length <= 4 && !t.normalized.includes(" "),
    }));
    allTerms = [...DOMAIN_TERMS, ...extras].sort((a, b) => b.normalized.length - a.normalized.length);
  }

  for (const term of allTerms) {
    // Skip excluded terms
    if (excludedSet && excludedSet.has(term.normalized)) continue;

    // Use word boundary for BOUNDARY_TERMS to prevent "tır" inside "birleştirilmeli"
    let exists = false;
    if (BOUNDARY_TERMS.has(term.normalized)) {
      if (term.normalized.length <= 3) {
        exists = new RegExp(`(^|[^a-z0-9])${term.normalized}([^a-z0-9]|$)`).test(remaining);
      } else {
        exists = new RegExp(`(^|[^a-z0-9])${term.normalized}`).test(remaining);
      }
    } else {
      exists = remaining.includes(term.normalized);
    }

    if (exists) {
      found.push(term);
      // Replace matched term — use regex for boundary-aware replacement
      if (BOUNDARY_TERMS.has(term.normalized)) {
        remaining = remaining.replace(new RegExp(`(^|[^a-z0-9])${term.normalized}`), "$1" + " ".repeat(term.normalized.length));
      } else {
        remaining = remaining.replace(term.normalized, " ".repeat(term.normalized.length));
      }
    }
  }
  return found;
}

// Search for domain terms in content — terms must appear NEAR each other (same paragraph)
function findDomainTermMatches(queryText, contentText, extraTerms, excludedSet) {
  const queryTerms = extractQueryDomainTerms(queryText, extraTerms, excludedSet);
  if (queryTerms.length === 0) return null;

  const normContent = normalize(contentText);
  
  // Step 1: Find ALL positions of each term in content
  const termPositions = []; // { termIdx, position, term }
  
  // Generate search variants for compound terms
  function getVariants(norm) {
    const variants = [norm];
    if (norm.includes(" ")) {
      // "satin alma siparisi" → also try "satinalma siparisi", "satinalmasiparisi"
      variants.push(norm.replace(/\s+/g, ""));
      // Try removing first space only: "satin alma" → "satinalma"
      variants.push(norm.replace(" ", ""));
    } else if (norm.length >= 8) {
      // "satinalma" → also try "satin alma" (insert space at common split points)
      for (let sp = 3; sp < norm.length - 2; sp++) {
        variants.push(norm.slice(0, sp) + " " + norm.slice(sp));
      }
    }
    return [...new Set(variants)];
  }
  
  for (let ti = 0; ti < queryTerms.length; ti++) {
    const term = queryTerms[ti];
    const variants = getVariants(term.normalized);
    
    for (const variant of variants) {
      let searchFrom = 0;
      while (true) {
        const idx = normContent.indexOf(variant, searchFrom);
        if (idx === -1) break;
        // Boundary check
        if (BOUNDARY_TERMS.has(term.normalized) || BOUNDARY_TERMS.has(variant)) {
          const before = idx > 0 ? normContent[idx - 1] : " ";
          if (/[a-z0-9]/.test(before)) {
            searchFrom = idx + 1;
            continue;
          }
          if (variant.length <= 3) {
            const after = idx + variant.length < normContent.length ? normContent[idx + variant.length] : " ";
            if (/[a-z0-9]/.test(after)) {
              searchFrom = idx + 1;
              continue;
            }
          }
        }
        termPositions.push({ termIdx: ti, position: idx, term });
        searchFrom = idx + variant.length;
        break; // Found at least one match for this variant, move on
      }
      if (termPositions.some(tp => tp.termIdx === ti)) break; // Already found, skip other variants
    }
  }

  if (termPositions.length === 0) return null;

  // Step 2: Find the best proximity window (800 chars) with the most UNIQUE terms
  termPositions.sort((a, b) => a.position - b.position);
  const WINDOW = 800;
  let bestWindowStart = 0;
  let bestUniqueTerms = new Set();

  for (let i = 0; i < termPositions.length; i++) {
    const windowStart = termPositions[i].position;
    const uniqueInWindow = new Set();
    for (let j = i; j < termPositions.length; j++) {
      if (termPositions[j].position - windowStart <= WINDOW) {
        uniqueInWindow.add(termPositions[j].termIdx);
      } else {
        break;
      }
    }
    if (uniqueInWindow.size > bestUniqueTerms.size) {
      bestUniqueTerms = uniqueInWindow;
      bestWindowStart = windowStart;
    }
  }

  // Step 3: Only count terms that appear within the best proximity window
  const proximityFoundTerms = [];
  const proximityMissingTerms = [];

  for (let ti = 0; ti < queryTerms.length; ti++) {
    if (bestUniqueTerms.has(ti)) {
      proximityFoundTerms.push(queryTerms[ti]);
    } else {
      proximityMissingTerms.push(queryTerms[ti]);
    }
  }

  if (proximityFoundTerms.length === 0) return null;

  const score = Math.round((proximityFoundTerms.length / queryTerms.length) * 100);

  // Build explanation
  const parts = [];
  proximityFoundTerms.forEach(t => parts.push(`✓ ${t.original}`));
  proximityMissingTerms.forEach(t => parts.push(`✗ ${t.original}`));

  return {
    score,
    foundTerms: proximityFoundTerms,
    missingTerms: proximityMissingTerms,
    explanation: parts.join("  ·  "),
    highlightWords: proximityFoundTerms.map(t => t.normalized),
    bestWindowStart,
  };
}

    processKeywords = [];
    for (const pf of processFilters) {
      const kws = PROCESS_MAP[pf];
      if (kws) processKeywords.push(...kws);
    }
  }

  for (const doc of documents) {
    for (const section of doc.sections) {
      // Process keyword filter: heading OR content must contain at least one keyword
      if (processKeywords && processKeywords.length > 0) {
        const normHeading = normalize(section.heading || "");
        const normContentFull = normalize(section.content || "");
        const searchText = normHeading + " " + normContentFull;
        const hasKeyword = processKeywords.some(kw => {
          if (BOUNDARY_TERMS.has(kw)) {
            if (kw.length <= 3) {
              return new RegExp(`(^|[^a-z0-9])${kw}([^a-z0-9]|$)`).test(searchText);
            }
            return new RegExp(`(^|[^a-z0-9])${kw}`).test(searchText);
          }
          return searchText.includes(kw);
        });
        if (!hasKeyword) continue;
      }

      const normContent = normalize(section.content);
      let status = "";
      let contextSnippet = "";
      let synonymExplanation = "";
      let synonymScore = 0;
      let highlightWords = [];

      // 1. BULUNDU — exact phrase match
      const exactIdx = normContent.indexOf(normQuery);
      if (exactIdx !== -1) {
        status = "bulundu";
        const origIdx = findOriginalIndex(section.content, normContent, exactIdx, normQuery.length);
        contextSnippet = getContext(section.content, origIdx, 150);
      }

      // 2. BENZERİ — all significant words present in content (whole-word for short terms)
      if (!status && searchWords.length > 0) {
        const allPresent = searchWords.every(w => wordExistsIn(w, normContent));
        if (allPresent) {
          status = "benzeri";
          const firstLongWord = searchWords.find(w => !BOUNDARY_TERMS.has(w)) || searchWords[0];
          const firstWordIdx = normContent.indexOf(firstLongWord);
          if (firstWordIdx !== -1) {
            const origIdx = findOriginalIndex(section.content, normContent, firstWordIdx, firstLongWord.length);
            contextSnippet = getContext(section.content, origIdx, 150);
          }
        }
      }

      // 3. BENZERİ — fuzzy word match (80%+ words at 80%+ char similarity)
      if (!status && searchWords.length >= 2) {
        const contentWords = normContent.split(" ").filter(w => w.length >= 3);
        let matchedCount = 0;
        let fuzzyPositions = [];
        for (const qw of searchWords) {
          let bestSim = 0;
          let bestPos = -1;
          for (let i = 0; i < contentWords.length; i++) {
            const sim = wordSimilarity(qw, contentWords[i]);
            if (sim > bestSim) { bestSim = sim; bestPos = i; }
          }
          if (bestSim >= 0.8) { matchedCount++; if (bestPos >= 0) fuzzyPositions.push(bestPos); }
        }
        if (matchedCount / searchWords.length >= 0.8) {
          status = "benzeri";
          if (fuzzyPositions.length > 0) {
            const minPos = Math.min(...fuzzyPositions);
            const approxIdx = normContent.split(" ").slice(0, minPos).join(" ").length;
            const origIdx = findOriginalIndex(section.content, normContent, approxIdx, 10);
            contextSnippet = getContext(section.content, origIdx, 150);
          }
        }
      }

      // 4. ANLAMSAL — domain term search: at least 1 term in content
      if (!status) {
        const termMatch = findDomainTermMatches(query, section.content, null, excludedSet);
        if (termMatch && termMatch.foundTerms.length >= 1) {
          // ALL domain terms found in proximity → valid match
          status = "anlamsal";
          synonymExplanation = termMatch.explanation;
          synonymScore = termMatch.score;
          highlightWords = termMatch.highlightWords;
          const origIdx = findOriginalIndex(section.content, normContent, termMatch.bestWindowStart, 10);
          contextSnippet = getContext(section.content, origIdx, 250);
        }
      }

      if (status) {
        const finalSnippet = contextSnippet || section.content.substring(0, 200) + "...";
        
        // Check domain terms against the DISPLAYED snippet for ✓/✗ consistency
        // getContext now snaps to word boundaries, so terms won't be cut
        let domainInfo = null;
        const queryTerms = extractQueryDomainTerms(query, extraTerms, excludedSet);
        if (queryTerms.length > 0) {
          const normSnippet = normalize(finalSnippet);
          const foundTerms = [];
          const missingTerms = [];
          const hlWords = [];
          
          for (const term of queryTerms) {
            let found = false;
            if (BOUNDARY_TERMS.has(term.normalized)) {
              if (term.normalized.length <= 3) {
                found = new RegExp(`(^|[^a-z0-9])${term.normalized}([^a-z0-9]|$)`).test(normSnippet);
              } else {
                found = new RegExp(`(^|[^a-z0-9])${term.normalized}`).test(normSnippet);
              }
            } else {
              found = normSnippet.includes(term.normalized);
            }
            
            if (found) {
              foundTerms.push(term);
              hlWords.push(term.normalized);
            } else {
              missingTerms.push(term);
            }
          }
          
          domainInfo = { foundTerms, missingTerms };
          if (!highlightWords.length) highlightWords = hlWords;
        }

        results.push({
          docName: doc.name,
          docType: doc.type,
          heading: section.heading,
          headingPath: section.headingPath,
          content: section.content,
          status,
          contextSnippet: finalSnippet,
          synonymExplanation,
          synonymScore,
          highlightWords,
          domainInfo,
        });
      }
    }
  }

  // Sort: bulundu > benzeri > anlamsal (within anlamsal, higher score first)
  const order = { bulundu: 0, benzeri: 1, anlamsal: 2 };
  return results.sort((a, b) => {
    const oa = order[a.status] ?? 3, ob = order[b.status] ?? 3;
    if (oa !== ob) return oa - ob;
    return (b.synonymScore || 0) - (a.synonymScore || 0);
  });
}


function findOriginalIndex(original, normalized, normIdx, length) {
  const ratio = original.length / Math.max(normalized.length, 1);
  return Math.max(0, Math.min(Math.floor(normIdx * ratio), original.length - 1));
}

function getContext(text, idx, radius) {
  let start = Math.max(0, idx - radius);
  let end = Math.min(text.length, idx + radius);
  
  // Snap start forward to next word boundary (don't cut a word in half)
  if (start > 0) {
    const nextSpace = text.indexOf(" ", start);
    if (nextSpace !== -1 && nextSpace < start + 30) start = nextSpace + 1;
  }
  // Snap end backward to previous word boundary
  if (end < text.length) {
    const prevSpace = text.lastIndexOf(" ", end);
    if (prevSpace !== -1 && prevSpace > end - 30) end = prevSpace;
  }
  
  let ctx = text.substring(start, end).trim();
  if (start > 0) ctx = "..." + ctx;
  if (end < text.length) ctx = ctx + "...";
  return ctx;
}

function highlightMatch(text, query) {
  if (!query.trim() || !text) return text;
  const norm = normalize(query);
  const words = norm.split(" ").filter(Boolean);
  let result = text;
  for (const word of words) {
    const regex = new RegExp(`(${word.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, "gi");
    result = result.replace(regex, "⟪$1⟫");
  }
  return result;
}

/* ────────────────── Load SheetJS from CDN ──────────────── */
function useSheetJS() {
  const [loaded, setLoaded] = useState(!!window.XLSX);
  useEffect(() => {
    if (window.XLSX) { setLoaded(true); return; }
    const s = document.createElement("script");
    s.src = "https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js";
    s.onload = () => setLoaded(true);
    s.onerror = () => console.error("SheetJS load failed");
    document.head.appendChild(s);
  }, []);
  return loaded;
}

/* ────────────────── Load PDF.js from CDN ───────────────── */
function usePdfJS() {
  const [loaded, setLoaded] = useState(!!window.pdfjsLib);
  useEffect(() => {
    if (window.pdfjsLib) { setLoaded(true); return; }
    const s = document.createElement("script");
    s.src = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js";
    s.onload = () => {
      if (window.pdfjsLib) {
        window.pdfjsLib.GlobalWorkerOptions.workerSrc =
          "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
        setLoaded(true);
      }
    };
    s.onerror = () => console.error("PDF.js load failed");
    document.head.appendChild(s);
  }, []);
  return loaded;
}

// Parse PDF using pdf.js
async function parsePdf(arrayBuffer) {
  const pdfjsLib = window.pdfjsLib;
  if (!pdfjsLib) return [];
  const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
  const sections = [];
  let currentHeading = "Genel";
  let currentHeadingPath = ["Genel"];
  let currentParagraphs = [];
  let lastFontSize = 0;

  const flush = () => {
    if (currentParagraphs.length > 0) {
      sections.push({
        heading: currentHeading,
        headingPath: [...currentHeadingPath],
        content: currentParagraphs.join("\n"),
      });
      currentParagraphs = [];
    }
  };

  for (let i = 1; i <= pdf.numPages; i++) {
    const page = await pdf.getPage(i);
    const textContent = await page.getTextContent();
    const items = textContent.items;

    // Detect font sizes to identify headings
    const fontSizes = items.map(it => it.height || it.transform?.[0] || 12);
    const avgFontSize = fontSizes.length > 0
      ? fontSizes.reduce((a, b) => a + b, 0) / fontSizes.length
      : 12;

    let lineBuffer = "";
    let lineFontSize = 0;
    let lastY = null;

    for (const item of items) {
      const text = item.str;
      const fontSize = item.height || item.transform?.[0] || 12;
      const y = item.transform ? item.transform[5] : 0;

      // Detect line break (Y position change)
      if (lastY !== null && Math.abs(y - lastY) > 3 && lineBuffer.trim()) {
        // Process completed line
        if (lineFontSize > avgFontSize * 1.15 && lineBuffer.trim().length < 120) {
          // This looks like a heading
          flush();
          currentHeading = lineBuffer.trim();
          if (lineFontSize > avgFontSize * 1.4) {
            currentHeadingPath = [currentHeading];
          } else {
            currentHeadingPath = [currentHeadingPath[0] || "Genel", currentHeading];
          }
        } else if (lineBuffer.trim()) {
          currentParagraphs.push(lineBuffer.trim());
        }
        lineBuffer = text;
        lineFontSize = fontSize;
      } else {
        lineBuffer += text;
        lineFontSize = Math.max(lineFontSize, fontSize);
      }
      lastY = y;
    }

    // Flush remaining line in page
    if (lineBuffer.trim()) {
      if (lineFontSize > avgFontSize * 1.15 && lineBuffer.trim().length < 120) {
        flush();
        currentHeading = lineBuffer.trim();
        currentHeadingPath = [currentHeadingPath[0] || "Genel", currentHeading];
      } else {
        currentParagraphs.push(lineBuffer.trim());
      }
    }
  }
  flush();

  // Fallback: if no sections detected, create one per page
  if (sections.length === 0) {
    for (let i = 1; i <= pdf.numPages; i++) {
      const page = await pdf.getPage(i);
      const textContent = await page.getTextContent();
      const pageText = textContent.items.map(it => it.str).join(" ").trim();
      if (pageText) {
        sections.push({
          heading: `Sayfa ${i}`,
          headingPath: [`Sayfa ${i}`],
          content: pageText,
        });
      }
    }
  }

  return sections;
}

              {/* Summary Banner */}
              {(() => {
                const exactCount = results.filter(r => r.status === "bulundu").length;

                const semanticCount = results.filter(r => r.status === "anlamsal").length;
                return (
                  <div style={styles.summaryBanner}>
                    <div style={styles.summaryLeft}>
                      <span style={styles.summaryQuery}>"{searchQuery}"</span>
                      <span style={{ color: "#475569", fontSize: 14 }}>ifadesi için sonuçlar:</span>
                    </div>
                    <div style={styles.summaryBadges}>
                      {exactCount > 0 && (
                        <span style={styles.summaryBadgeGreen}>

                        </span>
                      )}
                      {similarCount > 0 && (
                        <span style={styles.summaryBadgeAmber}>
                          🔍 {similarCount} Benzeri Bulundu
                        </span>
                      )}
                      {semanticCount > 0 && (
                        <span style={styles.summaryBadgePurple}>
                          🧠 {semanticCount} Anlamsal Eşleşme
                        </span>
                      )}
                    </div>
                  </div>
                );
              })()}

              <div style={styles.resultsGrid}>
                {results.map((r, i) => {
                  const isBulundu = r.status === "bulundu";
                  const isAnlamsal = r.status === "anlamsal";
                  const borderColor = isBulundu ? "#16a34a" : isAnlamsal ? "#8b5cf6" : "#f59e0b";
                  const badgeBg = isBulundu ? "#dcfce7" : isAnlamsal ? "#ede9fe" : "#fef3c7";
                  const badgeColor = isBulundu ? "#166534" : isAnlamsal ? "#5b21b6" : "#92400e";
                  const badgeBorder = isBulundu ? "#bbf7d0" : isAnlamsal ? "#c4b5fd" : "#fde68a";
                  const badgeText = isBulundu ? "✅ BULUNDU" : isAnlamsal ? "🔑 TERİM EŞLEŞMESİ" : "🔍 BENZERİ BULUNDU";
                  const ctxBg = isBulundu ? "#f0fdf4" : isAnlamsal ? "#f5f3ff" : "#fffbeb";
                  return (
                    <div
                      key={i}
                      className="result-card"
                      style={{
                        ...styles.resultCard,
                        animationDelay: `${i * 0.06}s`,
                        borderLeft: `4px solid ${borderColor}`,
                      }}
                    >
                      {/* Status + Doc Header */}
                      <div style={styles.cardHeader}>
                        <div style={{ display: "flex", alignItems: "center", gap: 10, flex: 1, minWidth: 0 }}>
                          <span style={{
                            ...styles.statusBadge,
                            background: badgeBg,
                            color: badgeColor,
                            borderColor: badgeBorder,
                          }}>
                            {badgeText}
                          </span>
                        </div>
                        <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                          <span className="tag-badge" style={{
                            ...styles.typeBadge,
                            background: typeColors[r.docType]?.bg,
                            color: typeColors[r.docType]?.color,
                            fontSize: 10,
                          }}>
                            {typeColors[r.docType]?.label}
                          </span>
                        </div>
                      </div>

                      {/* Document Name */}
                      <div style={styles.cardDocRow}>
                        <span style={styles.cardDocIcon}>{Icons.doc}</span>
                        <span style={styles.cardDocName} title={r.docName}>{r.docName}</span>
                      </div>

                      {/* Location Info */}
                      <div style={styles.locationBox}>
                        <div style={styles.locationRow}>
                          <span style={styles.locationLabel}>📑 Başlık / Bölüm:</span>
                          <span style={styles.locationValue}>{r.headingPath?.join(" → ") || r.heading}</span>
                        </div>
                        <div style={styles.locationRow}>
                          <span style={styles.locationLabel}>⚙️ Süreç:</span>
                          <span style={styles.locationValue}>{r.heading}</span>
                        </div>
                      </div>

                      {/* Domain Terms — dynamically computed based on visible text */}
                      {(() => {
                        // Get terms from query (static domain terms)
                        const queryTerms = extractQueryDomainTerms(searchQuery, null, excludedTerms);
                        // Always add custom terms — they don't need to be in the query
                        const customTermObjects = customTerms
                          .filter(t => !excludedTerms.has(normalize(t)))
                          .map(t => ({ original: t, normalized: normalize(t) }));
                        const allTerms = [...queryTerms, ...customTermObjects.filter(ct => 
                          !queryTerms.some(qt => qt.normalized === ct.normalized)
                        )];
                        if (allTerms.length === 0) return null;
                        // Always check against FULL section content for consistent ✓/✗
                        const normCheck = normalize(r.content || "");
                        const found = [];
                        const missing = [];
                        // Generate variants for compound terms
                        const getVars = (n) => {
                          const v = [n];
                          if (n.includes(" ")) { v.push(n.replace(/\s+/g, "")); v.push(n.replace(" ", "")); }
                          return v;
                        };
                        for (const term of allTerms) {
                          let exists = false;
                          const variants = getVars(term.normalized);
                          for (const vr of variants) {
                            if (BOUNDARY_TERMS.has(vr) || BOUNDARY_TERMS.has(term.normalized)) {
                              if (vr.length <= 3) {
                                exists = new RegExp(`(^|[^a-z0-9])${vr}([^a-z0-9]|$)`).test(normCheck);
                              } else {
                                exists = new RegExp(`(^|[^a-z0-9])${vr}`).test(normCheck);
                              }
                            } else {
                              exists = normCheck.includes(vr);
                            }
                            if (exists) break;
                          }
                          if (exists) found.push(term); else missing.push(term);
                        }
                        if (found.length === 0 && missing.length === 0) return null;
                        return (
                          <div style={styles.synonymBox}>
                            <span style={styles.synonymLabel}>🔑 Lojistik Terimler:</span>
                            <div style={{ display: "flex", flexWrap: "wrap", gap: 4, flex: 1 }}>
                              {found.map((t, ti) => (
                                <span key={`f${ti}`} style={styles.termChipFound}>
                                  ✓ {t.original}
                                  <span
                                    style={styles.termChipRemove}
                                    onClick={(e) => { e.stopPropagation(); excludeTerm(t.normalized); }}
                                    title="Bu terimi aramadan çıkar"
                                  >✕</span>
                                </span>
                              ))}
                              {missing.map((t, ti) => (
                                <span key={`m${ti}`} style={styles.termChipMissing}>
                                  ✗ {t.original}
                                </span>
                              ))}
                            </div>
                          </div>
                        );
                      })()}
                      {/* Excluded terms — click to restore */}
                      {excludedTerms.size > 0 && i === 0 && (
                        <div style={{ margin: "0 20px 4px", display: "flex", flexWrap: "wrap", gap: 4, alignItems: "center" }}>
                          <span style={{ fontSize: 10, color: "#94a3b8" }}>Çıkarılan:</span>
                          {[...excludedTerms].map((nt, ei) => (
                            <span
                              key={ei}
                              style={styles.termChipExcluded}
                              onClick={() => restoreTerm(nt)}
                              title="Geri ekle"
                            >
                              + {nt}
                            </span>
                          ))}
                        </div>
                      )}

                      {/* Context — click to expand */}
                      <div style={styles.contextBox}>
                        <p
                          style={styles.contextLabel}
                          onClick={() => setExpandedCards(prev => {
                            const next = new Set(prev);
                            next.has(i) ? next.delete(i) : next.add(i);
                            return next;
                          })}
                        >
                          <span>İlgili Metin:</span>
                          <span style={styles.expandToggle}>
                            {expandedCards.has(i) ? "▲ Küçült" : "▼ Tam Göster"}
                          </span>
                        </p>
                        <div
                          style={{
                            ...styles.contextText,
                            borderLeftColor: borderColor,
                            background: ctxBg,
                            maxHeight: expandedCards.has(i) ? "none" : 120,
                            overflow: expandedCards.has(i) ? "visible" : "hidden",
                            cursor: "pointer",
                            position: "relative",
                          }}
                          onClick={() => setExpandedCards(prev => {
                            const next = new Set(prev);
                            next.has(i) ? next.delete(i) : next.add(i);
                            return next;
                          })}
                        >
                          {expandedCards.has(i)
                            ? renderHighlighted(r.content, searchQuery, r.highlightWords)
                            : renderHighlighted(r.contextSnippet, searchQuery, r.highlightWords)
                          }
                          {!expandedCards.has(i) && r.content.length > 250 && (
                            <div style={styles.fadeOverlay} />
                          )}
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          )}
        </section>
      </main>
    </div>
  );
}

function renderHighlighted(text, query, extraWords) {
  if (!text) return text;
  
  // Collect meaningful words to highlight
  const hlWords = new Set();
  
  // From query: only significant words, min 3 chars (or known short terms)
  if (query?.trim()) {
    const qNorm = normalize(query);
    const qWords = qNorm.split(/\s+/).filter(isSignificant);
    qWords.forEach(w => { if (w.length >= 3 || BOUNDARY_TERMS.has(w)) hlWords.add(w); });
  }
  
  // From extra words (domain terms found in content)
  if (extraWords && extraWords.length > 0) {
    extraWords.forEach(w => { if (w.length >= 3 || BOUNDARY_TERMS.has(w)) hlWords.add(w); });
  }
  
  if (hlWords.size === 0) return text;
  
  // Build regex — ALL words need word-start boundary to prevent matching inside other words
  const sorted = [...hlWords].sort((a, b) => b.length - a.length);
  const pattern = sorted.map(w => {
    const escaped = w.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    if (w.length <= 3) {
      // Full word boundary for very short words — prevents "id" inside "edilir"
      return `(?<=^|[^a-z0-9çğıöşü])${escaped}(?=[^a-z0-9çğıöşü]|$)`;
    }
    // Word-start boundary for longer words — allows Turkish suffixes
    return `(?<=^|[^a-z0-9çğıöşü])${escaped}`;
  }).join("|");
  
  // Use matchAll to find positions, then build React elements
  const regex = new RegExp(pattern, "gi");
  const matches = [];
  let m;
  while ((m = regex.exec(text)) !== null) {
    matches.push({ start: m.index, end: m.index + m[0].length, text: m[0] });
  }
  
  if (matches.length === 0) return text;
  
  const elements = [];
  let lastIdx = 0;
  matches.forEach((match, mi) => {
    if (match.start > lastIdx) {
      elements.push(text.substring(lastIdx, match.start));
    }
    const normPart = normalize(match.text);
    const isSynonym = extraWords?.some(ew => normPart.includes(normalize(ew)));
    elements.push(
      <mark key={mi} style={{
        background: isSynonym ? "#e9d5ff" : "#fde68a",
        color: isSynonym ? "#6b21a8" : "#92400e",
        padding: "1px 4px",
        borderRadius: 3,
        fontWeight: 600,
      }}>{match.text}</mark>
    );
    lastIdx = match.end;
  });
  if (lastIdx < text.length) {
    elements.push(text.substring(lastIdx));
  }
  return elements;
}
